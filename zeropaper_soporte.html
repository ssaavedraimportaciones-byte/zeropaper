<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZeroPaper™ — Soporte Técnico IA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --forest: #1B4332; --esm: #40916C; --esm2: #52B788;
  --mint: #D8F3DC; --mint2: #F0FAF4; --cream: #F8F9FA;
  --slate: #334155; --slate2: #64748B; --border: #E2E8F0;
  --white: #FFFFFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--cream); color: var(--slate); -webkit-font-smoothing: antialiased; }

/* LAYOUT */
.layout { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; }

/* HEADER */
.header {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-logo { font-weight: 900; font-size: 16px; }
.header-logo .z { color: var(--forest); }
.header-logo .p { color: var(--esm); }
.ai-badge {
  display: flex; align-items: center; gap: 5px;
  background: var(--mint); color: var(--forest);
  font-size: 11px; font-weight: 700; padding: 4px 10px;
  border-radius: 100px; border: 1px solid #B7E4C7;
}
.ai-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--esm); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
.header-links { display: flex; gap: 10px; }
.header-links a {
  font-size: 12px; font-weight: 600; color: var(--slate2); text-decoration: none;
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
  transition: all .2s;
}
.header-links a:hover { border-color: var(--esm); color: var(--forest); }

/* CHAT AREA */
.chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

/* WELCOME */
.welcome {
  background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 28px;
  text-align: center; margin-bottom: 4px;
}
.welcome-icon { font-size: 40px; margin-bottom: 12px; }
.welcome h2 { font-size: 20px; font-weight: 800; color: var(--forest); margin-bottom: 8px; }
.welcome p { font-size: 14px; color: var(--slate2); line-height: 1.6; max-width: 400px; margin: 0 auto 20px; }
.quick-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.quick-btn {
  background: var(--mint2); border: 1px solid var(--mint); color: var(--forest);
  font-size: 12px; font-weight: 600; padding: 7px 14px; border-radius: 100px;
  cursor: pointer; transition: all .2s; border: none; font-family: 'Inter', sans-serif;
}
.quick-btn:hover { background: var(--mint); }

/* MESSAGES */
.msg { display: flex; gap: 10px; max-width: 90%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.ai { align-self: flex-start; }

.msg-avatar {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.msg.ai .msg-avatar { background: var(--forest); }
.msg.user .msg-avatar { background: var(--esm2); font-size: 12px; font-weight: 700; color: white; }

.msg-bubble {
  padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.65;
  max-width: calc(100% - 42px);
}
.msg.ai .msg-bubble {
  background: var(--white); border: 1px solid var(--border);
  border-bottom-left-radius: 4px; color: var(--slate);
}
.msg.user .msg-bubble {
  background: var(--forest); color: white;
  border-bottom-right-radius: 4px;
}

/* Markdown básico en respuestas AI */
.msg.ai .msg-bubble strong { color: var(--forest); font-weight: 700; }
.msg.ai .msg-bubble code {
  background: var(--cream); color: var(--esm); font-family: monospace;
  padding: 2px 5px; border-radius: 4px; font-size: 12px;
}
.msg.ai .msg-bubble ol, .msg.ai .msg-bubble ul { padding-left: 18px; margin: 6px 0; }
.msg.ai .msg-bubble li { margin: 4px 0; }
.msg.ai .msg-bubble p { margin: 4px 0; }
.msg.ai .msg-bubble p:first-child { margin-top: 0; }
.msg.ai .msg-bubble p:last-child { margin-bottom: 0; }

/* Typing indicator */
.typing { display: flex; gap: 4px; padding: 14px 16px; }
.typing span {
  width: 7px; height: 7px; border-radius: 50%; background: var(--slate2);
  animation: typing-bounce 1.2s ease-in-out infinite;
}
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes typing-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* TIMESTAMP */
.msg-time { font-size: 10px; color: var(--slate2); margin-top: 4px; opacity: .7; text-align: right; }
.msg.ai .msg-time { text-align: left; }

/* INPUT AREA */
.input-area {
  background: var(--white); border-top: 1px solid var(--border);
  padding: 14px 16px; flex-shrink: 0;
}
.input-row { display: flex; gap: 10px; align-items: flex-end; }
.input-wrap { flex: 1; position: relative; }
textarea {
  width: 100%; resize: none; border: 1.5px solid var(--border); border-radius: 12px;
  padding: 11px 14px; font-size: 14px; font-family: 'Inter', sans-serif;
  color: var(--slate); background: var(--cream); outline: none; line-height: 1.5;
  transition: border-color .2s; max-height: 120px; min-height: 44px;
}
textarea:focus { border-color: var(--esm); background: white; }
textarea::placeholder { color: var(--slate2); }
.send-btn {
  width: 44px; height: 44px; border-radius: 12px; border: none; flex-shrink: 0;
  background: var(--forest); color: white; cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; align-self: flex-end;
}
.send-btn:hover { background: #2D6A4F; }
.send-btn:disabled { background: var(--border); cursor: not-allowed; }
.input-hint { font-size: 11px; color: var(--slate2); margin-top: 6px; text-align: center; }

/* SCROLLBAR */
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

@media(max-width: 600px) {
  .header-links { display: none; }
  .chat-area { padding: 14px; }
  .msg { max-width: 95%; }
}
</style>
</head>
<body>

<div class="layout">

  <!-- HEADER -->
  <div class="header">
    <div class="header-brand">
      <div class="header-logo"><span class="z">Zero</span><span class="p">Paper</span><span style="color:var(--esm);font-size:10px">™</span></div>
      <div class="ai-badge">
        <span class="ai-dot"></span>
        Soporte IA · En línea
      </div>
    </div>
    <div class="header-links">
      <a href="/app">App Operador</a>
      <a href="/admin">Admin</a>
      <a href="/">← Inicio</a>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-area" id="chatArea">

    <!-- Welcome card -->
    <div class="welcome" id="welcomeCard">
      <div class="welcome-icon">🤖</div>
      <h2>Soporte Técnico ZeroPaper™</h2>
      <p>Soy el asistente de soporte. Puedo ayudarte con el uso del sistema, resolver errores y guiarte paso a paso.</p>
      <div class="quick-btns">
        <button class="quick-btn" onclick="sendQuick('¿Cómo registro una operación de ingreso?')">¿Cómo registro un ingreso?</button>
        <button class="quick-btn" onclick="sendQuick('La app no sincroniza, ¿qué hago?')">App no sincroniza</button>
        <button class="quick-btn" onclick="sendQuick('¿Cómo apruebo operaciones como admin?')">Aprobar operaciones</button>
        <button class="quick-btn" onclick="sendQuick('¿Cómo exporto el reporte en CSV?')">Exportar reportes</button>
        <button class="quick-btn" onclick="sendQuick('No puedo iniciar sesión')">Problemas de acceso</button>
        <button class="quick-btn" onclick="sendQuick('¿Cómo funciona el modo offline?')">Modo offline</button>
      </div>
    </div>

  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-row">
      <div class="input-wrap">
        <textarea
          id="userInput"
          placeholder="Escribe tu consulta técnica..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Enviar (Enter)">
        ↑
      </button>
    </div>
    <div class="input-hint">Enter para enviar · Shift+Enter para nueva línea</div>
  </div>

</div>

<script>
const chatArea   = document.getElementById('chatArea');
const userInput  = document.getElementById('userInput');
const sendBtn    = document.getElementById('sendBtn');
const welcomeCard = document.getElementById('welcomeCard');

let messages     = [];  // conversation history
let isLoading    = false;

// ── Auto-resize textarea ──────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Enter key handler ─────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ── Quick suggestion ──────────────────────────────
function sendQuick(text) {
  userInput.value = text;
  sendMessage();
}

// ── Format timestamp ──────────────────────────────
function timeNow() {
  return new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
}

// ── Simple markdown → HTML ────────────────────────
function mdToHtml(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^(\d+)\.\s+(.+)$/gm, '<li>$2</li>')
    .replace(/(<li>.*<\/li>)/s, '<ol>$1</ol>')
    .replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^(?!<)(.+)$/gm, (m) => m.startsWith('<') ? m : `<p>${m}</p>`);
}

// ── Append user message ───────────────────────────
function appendUser(text) {
  if (welcomeCard) welcomeCard.style.display = 'none';

  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="msg-avatar">YO</div>
    <div>
      <div class="msg-bubble">${text.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
      <div class="msg-time">${timeNow()}</div>
    </div>`;
  chatArea.appendChild(div);
  scrollDown();
}

// ── Append AI bubble (streaming) ─────────────────
function appendAI() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div>
      <div class="msg-bubble" id="streaming-bubble">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    </div>`;
  chatArea.appendChild(div);
  scrollDown();
  return document.getElementById('streaming-bubble');
}

// ── Finalize AI bubble ────────────────────────────
function finalizeAI(bubble, fullText) {
  bubble.removeAttribute('id');
  bubble.innerHTML = mdToHtml(fullText);

  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = timeNow();
  bubble.parentElement.appendChild(timeEl);
  scrollDown();
}

// ── Scroll to bottom ──────────────────────────────
function scrollDown() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

// ── MAIN SEND ─────────────────────────────────────
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  userInput.value = '';
  userInput.style.height = 'auto';

  // Append to history
  messages.push({ role: 'user', content: text });
  appendUser(text);

  const bubble = appendAI();
  let fullText = '';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `Error ${res.status}`);
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer    = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;

        try {
          const parsed = JSON.parse(data);
          if (parsed.error) throw new Error(parsed.error);
          if (parsed.text) {
            fullText += parsed.text;
            // Live update while streaming
            bubble.textContent = fullText + '▌';
            scrollDown();
          }
        } catch (e) {
          if (e.message !== 'Unexpected end of JSON input') throw e;
        }
      }
    }

    // Final render with markdown
    messages.push({ role: 'assistant', content: fullText });
    finalizeAI(bubble, fullText);

  } catch (err) {
    const errorText = err.message.includes('API key')
      ? '⚠️ El servicio de IA no está configurado aún. Por favor contacta al administrador del sistema.'
      : `❌ Error al conectar con el asistente: ${err.message}. Intenta nuevamente.`;

    bubble.innerHTML = `<p style="color:#dc2626">${errorText}</p>`;
    scrollDown();
  } finally {
    isLoading    = false;
    sendBtn.disabled = false;
    userInput.focus();
  }
}

// ── Init: focus input ────────────────────────────
userInput.focus();
</script>
</body>
</html>
